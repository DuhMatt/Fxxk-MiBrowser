name: Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Restore signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p app/signing signing
          echo "$KEYSTORE_BASE64" | base64 -d > app/signing/release.jks

      - name: Create signing properties
        run: |
          printf 'storeFile=signing/release.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
            "${{ secrets.KEYSTORE_PASSWORD }}" \
            "${{ secrets.KEY_ALIAS }}" \
            "${{ secrets.KEY_PASSWORD }}" \
            > signing/release-keystore.properties

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          TAG_NAME="${{ github.ref_name }}"
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/Fxxk-MiBrowser-${TAG_NAME}.apk

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/Fxxk-MiBrowser-${{ github.ref_name }}.apk

      - name: Sync to Xposed repo
        if: env.LSPOSED_TOKEN != ''
        env:
          LSPOSED_TOKEN: ${{ secrets.LSPOSED_TOKEN }}
          GH_TOKEN: ${{ secrets.LSPOSED_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION_NAME="${TAG_NAME#v}"
          VERSION_CODE=$(grep -oP 'versionCode\s*=\s*\K\d+' app/build.gradle.kts)
          XPOSED_TAG="${VERSION_CODE}-${VERSION_NAME}"
          echo "Syncing ${XPOSED_TAG} to Xposed repo..."

          LSPOSED_SHA=$(gh api repos/Xposed-Modules-Repo/com.hyperosfix.browser/git/refs/heads/main --jq .object.sha)
          gh api repos/Xposed-Modules-Repo/com.hyperosfix.browser/git/tags \
            -f tag="${XPOSED_TAG}" \
            -f message="v${VERSION_NAME}" \
            -f object="${LSPOSED_SHA}" \
            -f type="commit" --jq .sha > /tmp/tag_sha
          TAG_OBJ_SHA=$(cat /tmp/tag_sha)
          gh api repos/Xposed-Modules-Repo/com.hyperosfix.browser/git/refs \
            -f ref="refs/tags/${XPOSED_TAG}" \
            -f sha="${TAG_OBJ_SHA}"

          gh release create "${XPOSED_TAG}" \
            --repo Xposed-Modules-Repo/com.hyperosfix.browser \
            --title "v${VERSION_NAME}" \
            --notes "v${VERSION_NAME}" \
            "app/build/outputs/apk/release/Fxxk-MiBrowser-${TAG_NAME}.apk"
